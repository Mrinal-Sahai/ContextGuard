spring:
  application:
    name: contextguard
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:contextguard}
    username: ${POSTGRES_USER:cguser}
    password: ${POSTGRES_PASSWORD:cgpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      format_sql: true
  show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: simple

server:
  port: 8080

github:
  api:
    base-url: https://api.github.com
    token: ${GITHUB_TOKEN:}

ai:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-1.5-pro
    temperature: 0.15
    max-tokens: 6000

  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o
    temperature: 0.1
    max-tokens: 6000

  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
    max-tokens: ${ANTHROPIC_MAX_TOKENS:6000}

semgrep:
  enabled: ${SEMGREP_ENABLED:true}
  timeout-seconds: ${SEMGREP_TIMEOUT_SECONDS:60}

# ── Bridge configuration ──────────────────────────────────────────────────────
# Docker: docker-compose.yml overrides bridge.tree-sitter.url with container-network URL.
# Local dev: set BRIDGE_TREE_SITTER_URL env var, or use the default below.
bridge:
  tree-sitter:
    url: ${BRIDGE_TREE_SITTER_URL:http://localhost:3000}

treesitter:
  bridge:
    timeout-ms: 10000
  batch:
    timeout-ms: 60000

logging:
  level:
    io.contextguard: INFO
    org.springframework.web: INFO
