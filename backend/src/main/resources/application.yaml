spring:
  application:
    name: contextguard
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:contextguard}
    username: ${POSTGRES_USER:cguser}
    password: ${POSTGRES_PASSWORD:cgpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      format_sql: true
  show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: simple

server:
  port: 8080

github:
  api:
    base-url: https://api.github.com
    token: ${GITHUB_TOKEN:}

ai:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-1.5-pro
    temperature: 0.15
    max-tokens: 6000

  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o
    temperature: 0.1
    max-tokens: 6000

# ── Bridge configuration ──────────────────────────────────────────────────────
# Local dev (mvn spring-boot:run from backend/): user.dir = backend/
#   script-path uses ../ to reach the project-root tree-sitter-bridge/
# Docker: docker-compose.yml overrides these with absolute /app/... paths
treesitter:
  bridge:
    script-path: ../tree-sitter-bridge/tree-sitter-bridge.js
    node-command: node
    timeout-ms: 10000
  batch:
    timeout-ms: 60000

dart:
  analysis:
    flutter-sdk-path: /opt/flutter
    timeout-ms: 15000
    batch-timeout-ms: 120000
    max-calls-per-file: 200

logging:
  level:
    io.contextguard: INFO
    org.springframework.web: INFO
