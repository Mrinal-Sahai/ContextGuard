spring:
  application:
    name: contextguard
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:contextguard}
    username: ${POSTGRES_USER:cguser}
    password: ${POSTGRES_PASSWORD:cgpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      format_sql: true
  show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: simple

server:
  port: 8080

github:
  api:
    base-url: https://api.github.com
    token: ${GITHUB_TOKEN:}
  oauth:
    client-id: ${GITHUB_OAUTH_CLIENT_ID:}
    client-secret: ${GITHUB_OAUTH_CLIENT_SECRET:}
    callback-url: ${GITHUB_OAUTH_CALLBACK_URL:http://localhost:8080/api/auth/github/callback}

jwt:
  secret: ${JWT_SECRET:contextguard-dev-secret-key-change-in-production-min-32chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

ai:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.0-flash
    temperature: 0.15
    max-tokens: 12000

  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4.1
    temperature: 0.1
    max-tokens: 12000

  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
    max-tokens: ${ANTHROPIC_MAX_TOKENS:6000}

semgrep:
  enabled: ${SEMGREP_ENABLED:true}
  timeout-seconds: ${SEMGREP_TIMEOUT_SECONDS:60}

# ── Bridge configuration ──────────────────────────────────────────────────────
# Docker: docker-compose.yml overrides bridge.*.url with container-network URLs.
# Local dev: set BRIDGE_TREE_SITTER_URL and BRIDGE_DART_URL env vars, or use
#   the defaults below (point at localhost if running bridges locally).
bridge:
  tree-sitter:
    url: ${BRIDGE_TREE_SITTER_URL:http://localhost:3000}
  dart:
    url: ${BRIDGE_DART_URL:http://localhost:3001}

treesitter:
  bridge:
    timeout-ms: 10000
  batch:
    timeout-ms: 60000

dart:
  analysis:
    timeout-ms: 15000
    batch-timeout-ms: 120000
    max-calls-per-file: 200

logging:
  level:
    io.contextguard: INFO
    org.springframework.web: INFO
