services:

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: contextguard-postgres
    environment:
      POSTGRES_DB: contextguard
      POSTGRES_USER: cguser
      POSTGRES_PASSWORD: cgpass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - contextguard-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cguser -d contextguard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────────
  # ContextGuard — Spring Boot Application
  #
  # Contains:
  #   - Spring Boot API (port 8080)
  #   - Node.js tree-sitter bridge  (internal subprocess)
  #   - Dart Analysis Server (LSP)  (internal subprocess, spawned by DartAnalysisBridgeService)
  #   - go-types-bridge binary      (internal subprocess)
  #   - Pyright                     (internal subprocess)
  #
  # Memory budget with Dart:
  #   JVM heap (60% of 3GB):         ~1.8GB
  #   Dart Analysis Server:          ~300-600MB (depends on project size)
  #   Node.js bridge:                ~150MB
  #   OS + overhead:                 ~300MB
  #   Total:                         ~3GB — hence memory limit raised to 3.5g
  # ─────────────────────────────────────────────────────────────────────────────
  contextguard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contextguard-app
    ports:
      - "8080:8080"
    environment:
      # ── Database ──────────────────────────────────────────────────────────────
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/contextguard
      SPRING_DATASOURCE_USERNAME: cguser
      SPRING_DATASOURCE_PASSWORD: cgpass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      # ── Spring profile ────────────────────────────────────────────────────────
      SPRING_PROFILES_ACTIVE: prod

      # ── Tree-sitter bridge ────────────────────────────────────────────────────
      # Spring Boot relaxed binding: UPPER_SNAKE → lower.dot.case property keys
      # TREESITTER_BRIDGE_SCRIPT_PATH  →  treesitter.bridge.script-path
      TREESITTER_BRIDGE_SCRIPT_PATH: /app/tree-sitter-bridge/tree-sitter-bridge.js
      TREESITTER_BRIDGE_NODE_COMMAND: node
      TREESITTER_BRIDGE_TIMEOUT_MS: 10000
      TREESITTER_BATCH_TIMEOUT_MS: 60000
      GO_TYPES_BRIDGE_PATH: /app/tree-sitter-bridge/go-types-bridge

      # ── Dart Analysis Server ──────────────────────────────────────────────────
      DART_ANALYSIS_FLUTTER_SDK_PATH: /opt/flutter
      DART_ANALYSIS_TIMEOUT_MS: 15000
      DART_ANALYSIS_BATCH_TIMEOUT_MS: 120000
      DART_ANALYSIS_MAX_CALLS_PER_FILE: 200

      # ── LLM provider (stub = no LLM calls, safe default) ─────────────────────
      LLM_PROVIDER: ${LLM_PROVIDER:-stub}

      # ── Secrets (from .env — never hardcode) ─────────────────────────────────
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}


    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - contextguard-net

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s    # raised from 60s — Dart Analysis Server adds ~15s startup
      retries: 3

    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: "50m"    # Spring Boot + bridge logs are verbose; cap per-file
        max-file: "5"      # keep 250MB total (5 × 50MB)

    deploy:
      resources:
        limits:
          memory: 3.5g    # raised from 2g — Dart Analysis Server needs ~300-600MB extra
          cpus: "2.0"
        reservations:
          memory: 2g      # raised from 1g
          cpus: "0.5"


volumes:
  postgres-data:

networks:
  contextguard-net:
    driver: bridge